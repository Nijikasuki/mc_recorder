# ============================================================
# 一键编排全栈: 6 个服务 (mysql + redis + pgvector + rabbitmq + backend + frontend)
#
# 启动:    docker compose up -d
# 停止:    docker compose down            (删容器, 保留数据卷)
# 看日志:   docker compose logs -f backend
# 重启某个: docker compose restart backend
#
# 访问:    http://localhost  (Nginx 80, 转发到 Vue/后端)
# ============================================================

services:

  # ============================================================
  # 服务 1: MySQL — 业务数据
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: mysql-wuwa
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: wuwa_record
      TZ: Asia/Shanghai
    command: --default-time-zone=+08:00
    ports:
      - "3306:3306"                # 暴露给宿主机, 方便 IDEA Database 工具连
    volumes:
      - wuwa_mysql_data:/var/lib/mysql
    healthcheck:                   # 健康检查: 启动后能 ping 通才算"健康"
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s            # 首次启动给 30 秒预热

  # ============================================================
  # 服务 2: Redis — 缓存
  # ============================================================
  redis:
    image: redis:7
    container_name: redis-wuwa
    restart: unless-stopped
    ports:
      - "6379:6379"

  # ============================================================
  # 服务 3: pgvector — 向量库 (鸣潮百科)
  # ============================================================
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: pgvector-wuwa
    restart: unless-stopped
    environment:
      POSTGRES_DB: wuwa_vectors
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      # 首次启动自动建 mc_ai_memory database (已有数据的卷不会重跑此脚本)
      - ./pgvector-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  # ============================================================
  # 服务 4: RabbitMQ — 消息队列
  # ============================================================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-wuwa
    restart: unless-stopped
    ports:
      - "5672:5672"                # AMQP 协议端口 (后端连这个)
      - "15672:15672"              # 管理 UI (浏览器看队列, guest/guest)

  # ============================================================
  # 服务 5: Backend — Spring Boot (HTTP 网关 + 业务)
  # ============================================================
  backend:
    image: mc_recorder:latest
    container_name: mc_recorder-backend
    restart: unless-stopped
    ports:
      - "8000:8000"                # 暴露给宿主机, 方便直接调 /api 调试
    depends_on:
      mysql:
        condition: service_healthy   # 等 mysql 健康检查通过才启动
      redis:
        condition: service_started
      pgvector:
        condition: service_started
      rabbitmq:
        condition: service_started
    environment:
      # ----- MySQL -----
      SPRING_DATASOURCE_URL: 'jdbc:mysql://mysql:3306/wuwa_record?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8'
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      # ----- Redis -----
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # ----- RabbitMQ -----
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      # ----- 转发到 Python AI 微服务 (Java AiController 用) -----
      PYTHON_AI_URL: http://python-ai:8001
      # ----- 跨服务认证 (Java InternalController 验) -----
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      # ----- JWT 签名密钥 -----
      JWT_SECRET: ${JWT_SECRET}

  # ============================================================
  # 服务 6: Python AI 微服务 — LangChain + LangGraph + RAG
  # ============================================================
  python-ai:
    image: mc-ai:latest
    container_name: mc_recorder-python-ai
    restart: unless-stopped
    # 不暴露 8001 到宿主机 (Java backend 容器内调它), 想直接访问加 ports: - "8001:8001"
    depends_on:
      pgvector:
        condition: service_started
      backend:
        condition: service_started   # Resonator 工具调 Java internal
    environment:
      # ----- LLM (智谱 GLM-4-plus) -----
      LLM_API_KEY: ${LLM_API_KEY}
      # LLM_BASE_URL / LLM_MODEL / LLM_TEMPERATURE 有 default, 不传也行
      # ----- Postgres (Memory + RAG 共用一个实例, 不同 database) -----
      POSTGRES_URL: postgresql://postgres:postgres@pgvector:5432/mc_ai_memory
      RAG_PG_URL: postgresql+psycopg://postgres:postgres@pgvector:5432/wuwa_vectors
      # ----- 外部工具 -----
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      # ----- 调 Java internal endpoint (查用户角色) -----
      JAVA_BASE_URL: http://backend:8000
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}

  # ============================================================
  # 服务 7: Frontend — Vue + Nginx
  # ============================================================
  frontend:
    image: mc_recorder-web:latest
    container_name: mc_recorder-frontend
    restart: unless-stopped
    ports:
      - "80:80"                    # 这是用户访问入口! 浏览器打 http://localhost
    depends_on:
      - backend                    # frontend 启动前等 backend 就绪

# ============================================================
# 顶层 volumes 声明: 复用已有的命名卷 (你旧数据安全保留)
# ============================================================
volumes:
  wuwa_mysql_data:
    external: true               # 外部已存在, 别新建
  pgvector_data:
    external: true               # 同上
