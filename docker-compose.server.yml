# ============================================================
# 服务器部署版 — docker-compose.yml
#   - 移除了 external: true (服务器是全新, 让 compose 自动建卷)
#   - 加了 backend 的 JVM 堆内存限制 (2GB 服务器必备)
#   - mysql 加了 buffer-pool-size 限制
# ============================================================

services:

  mysql:
    image: mysql:8.0.40
    container_name: mysql-wuwa
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: wuwa_record
      TZ: Asia/Shanghai
    command:
      - --default-time-zone=+08:00
      - --innodb-buffer-pool-size=128M     # 限制 MySQL 内存
    # ⭐ 生产环境不暴露 3306 给公网, 只能容器内部访问
    # ports:
    #   - "3306:3306"
    volumes:
      - wuwa_mysql_data:/var/lib/mysql
      # ⭐ 挂载 schema.sql 进自动初始化目录, 首次启动自动建表
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7
    container_name: redis-wuwa
    restart: unless-stopped
    command: --maxmemory 64mb --maxmemory-policy allkeys-lru     # 限 Redis 64MB
    # ⭐ 不暴露 6379, 内部访问

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: pgvector-wuwa
    restart: unless-stopped
    environment:
      POSTGRES_DB: wuwa_vectors
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # ⭐ 不暴露 5432, 内部访问
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      # 首次启动自动建 mc_ai_memory database
      - ./pgvector-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  # ⏸️ 临时关掉 rabbitmq 省内存 (2GB ECS 不够 7 容器跑)
  # 由于 register 端点 denyAll, 实际不会触发发邮件, 关了不影响
  # 想恢复, 取消下面注释 + 同步 backend depends_on 也取消
  # rabbitmq:
  #   image: rabbitmq:3-management
  #   container_name: rabbitmq-wuwa
  #   restart: unless-stopped
  #   ports:
  #     - "15672:15672"

  backend:
    image: ghcr.io/nijikasuki/mc_recorder/backend:latest
    container_name: mc_recorder-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      # rabbitmq:
      #   condition: service_started
    environment:
      JAVA_OPTS: "-Xms256m -Xmx384m"        # 限 JVM 堆内存 (从 512 降到 384 再省 128MB)
      # ----- 基础设施配置 (写死) -----
      SPRING_DATASOURCE_URL: 'jdbc:mysql://mysql:3306/wuwa_record?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8'
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_RABBITMQ_LISTENER_SIMPLE_AUTO_STARTUP: false
      SPRING_RABBITMQ_LISTENER_DIRECT_AUTO_STARTUP: false
      # ----- 转发到 Python AI 微服务 -----
      PYTHON_AI_URL: http://python-ai:8001
      # ----- ⭐ 敏感密钥从 .env 文件读, 永远不入镜像 / 不入 git -----
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      JWT_SECRET: ${JWT_SECRET}

  # ============================================================
  # Python AI 微服务 — LangChain + LangGraph
  # ============================================================
  python-ai:
    image: ghcr.io/nijikasuki/mc_recorder/python-ai:latest
    container_name: mc_recorder-python-ai
    restart: unless-stopped
    # 内部 8001, 不暴露公网 (Java backend 内部调它)
    depends_on:
      pgvector:
        condition: service_started
      backend:
        condition: service_started
    environment:
      # ----- LLM -----
      LLM_API_KEY: ${LLM_API_KEY}
      # ----- Postgres (Memory + RAG) -----
      POSTGRES_URL: postgresql://postgres:postgres@pgvector:5432/mc_ai_memory
      RAG_PG_URL: postgresql+psycopg://postgres:postgres@pgvector:5432/wuwa_vectors
      # ----- 外部工具 -----
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      # ----- 调 Java internal -----
      JAVA_BASE_URL: http://backend:8000
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}

  frontend:
    image: ghcr.io/nijikasuki/mc_recorder/frontend:latest
    container_name: mc_recorder-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

# 服务器全新, 让 compose 自动建卷 (没有 external: true)
volumes:
  wuwa_mysql_data:
  pgvector_data:
