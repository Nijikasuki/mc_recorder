# ============================================================
# GitHub Actions: 自动部署到阿里云服务器
#
# 触发: push 到 main 分支 (改任何代码都自动跑)
# 流程:
#   1. checkout 代码
#   2. 登录 ghcr.io (用 GitHub 自带 token, 无需额外配置)
#   3. 构建 backend 镜像 + 推 ghcr
#   4. 构建 frontend 镜像 + 推 ghcr
#   5. SSH 到服务器, docker compose pull + up
#
# 跑完 → 浏览器 http://8.145.47.57 看到新版
# ============================================================

name: Deploy to Aliyun

on:
  push:
    branches: [main]
  workflow_dispatch:    # 也能手动触发 (Actions 页面点按钮)

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/nijikasuki/mc_recorder/backend
  FRONTEND_IMAGE: ghcr.io/nijikasuki/mc_recorder/frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # 推 ghcr 需要

    steps:
      # ----- 1. checkout 代码 -----
      - name: Checkout
        uses: actions/checkout@v4

      # ----- 2. 登录 ghcr.io -----
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}       # GitHub 自带, 不用自己配

      # ----- 3. 设置 Docker buildx (多平台构建支持) -----
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ----- 4. 构建 + 推 backend 镜像 -----
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha          # 用 GitHub Actions 缓存加速
          cache-to: type=gha,mode=max

      # ----- 5. 构建 + 推 frontend 镜像 -----
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----- 6. SSH 到服务器, 拉镜像 + 重启容器 -----
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root
            echo "=== 拉新镜像 ==="
            docker compose pull
            echo "=== 重启容器 ==="
            docker compose up -d
            echo "=== 清理旧镜像 ==="
            docker image prune -f
            echo "=== 部署完成 ==="
            docker compose ps
