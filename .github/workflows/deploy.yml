# ============================================================
# GitHub Actions: 自动部署到阿里云服务器
#
# 触发: push 到 main 分支 (Phase 5 完成后恢复)
# 流程:
#   1. checkout 代码
#   2. 登录 ghcr.io
#   3. 构建 backend / frontend / python-ai 三个镜像 + 推 ghcr
#   4. scp 上传 docker-compose.server.yml + pgvector-init.sql 到服务器
#   5. SSH 到服务器, docker compose pull + up (用 server.yml)
# ============================================================

name: Deploy to Aliyun

on:
  push:
    branches: [main]
  workflow_dispatch:    # 也能手动触发 (Actions 页面 Run workflow)

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/nijikasuki/mc_recorder/backend
  FRONTEND_IMAGE: ghcr.io/nijikasuki/mc_recorder/frontend
  PYTHON_AI_IMAGE: ghcr.io/nijikasuki/mc_recorder/python-ai

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # 推 ghcr 需要

    steps:
      # ----- 1. checkout 代码 -----
      - name: Checkout
        uses: actions/checkout@v5

      # ----- 2. 登录 ghcr.io -----
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ----- 3. 设置 Docker buildx -----
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ----- 4. 构建 + 推 backend 镜像 -----
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----- 5. 构建 + 推 frontend 镜像 -----
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----- 6. 构建 + 推 python-ai 镜像 -----
      - name: Build and push python-ai
        uses: docker/build-push-action@v6
        with:
          context: python_ai_service
          file: python_ai_service/Dockerfile
          push: true
          tags: ${{ env.PYTHON_AI_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----- 7. 上传 docker-compose.server.yml + pgvector-init.sql 到服务器 -----
      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.server.yml,pgvector-init.sql,schema.sql"
          target: "/root"
          overwrite: true

      # ----- 8. SSH 到服务器, 拉镜像 + 重启容器 -----
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 40m    # 默认 10m, 国内拉 ghcr 慢, 给宽松些
          script: |
            cd /root
            echo "=== 拉新镜像 (含 python-ai) ==="
            docker compose -f docker-compose.server.yml pull
            echo "=== 重启容器 ==="
            docker compose -f docker-compose.server.yml up -d
            echo "=== 清理旧镜像 ==="
            docker image prune -f
            echo "=== 部署完成 ==="
            docker compose -f docker-compose.server.yml ps
