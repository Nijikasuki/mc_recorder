# ============================================================
# Nginx 反向代理配置
#   /api/*  → 转发到 backend 容器:8000 (Spring Boot)
#   /*      → 自己托管 Vue 静态文件
# ============================================================

server {
    listen 80;
    server_name _;    # _ = 接受任意域名

    # ---------- 静态文件根目录 ----------
    root /usr/share/nginx/html;
    index index.html;

    # ---------- API 反代 ----------
    # 浏览器调 /api/auth/login → Nginx 转给 backend:8000
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式响应需要的配置 (AI 聊天流式接口)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # ---------- Vue SPA 路由兜底 ----------
    # Vue 用 history 模式时, 浏览器刷新 /resonators 这种路径
    # Nginx 找不到这个文件 → 改成发 index.html, 让 Vue 路由处理
    location / {
        try_files $uri $uri/ /index.html;
    }
}
