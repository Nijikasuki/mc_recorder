# 8080 落在 Windows/Docker 保留端口段(8010-8109)里，bind 不了，故改 8000（不在任何保留段）
server:
  port: 8000

spring:
  application:
    name: mc_recorder
  datasource:
    url: jdbc:mysql://localhost:3306/wuwa_record?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

mybatis:
  configuration:
    map-underscore-to-camel-case: true

# ⭐ JWT 签名密钥 (HS256 要求 ≥32 字节)
jwt:
  secret: ${JWT_SECRET:mc-recorder-dev-secret-key-change-it-in-production-2026}

# ⭐ Python AI 服务地址 (将来重写 AiController 用 HTTP 转发)
python-ai:
  base-url: ${PYTHON_AI_URL:http://localhost:8001}

