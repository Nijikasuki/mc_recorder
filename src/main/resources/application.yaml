# 8080 落在 Windows/Docker 保留端口段(8010-8109)里，bind 不了，故改 8000（不在任何保留段）
server:
  port: 8000

spring:
  application:
    name: mc_recorder
  datasource:
    url: jdbc:mysql://localhost:3306/wuwa_record?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver

    pgvector:
      url: jdbc:postgresql://localhost:5432/wuwa_vectors
      username: ${POSTGRES_USERNAME:postgres}
      password: ${POSTGRES_PASSWORD:postgres}
      driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  ai:
    openai:
      base-url: https://open.bigmodel.cn/api/paas/v4
      # ⭐ 真实密钥从环境变量读, 不在源码里
      api-key: ${ZHIPU_API_KEY:set-via-env}
      chat:
        completions-path: /chat/completions
        model: glm-4-plus
      embedding:
        embeddings-path: /embeddings
        model: embedding-3
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

mybatis:
  configuration:
    map-underscore-to-camel-case: true

# ⭐ JWT 签名密钥 (HS256 要求 ≥32 字节)
jwt:
  secret: ${JWT_SECRET:mc-recorder-dev-secret-key-change-it-in-production-2026}

github:
  base-url: https://api.github.com
  token: ${GITHUB_TOKEN:set-via-env}

tavily:
  base-url: https://api.tavily.com
  api-key: ${TAVILY_API_KEY:set-via-env}

kurobbs:
  base-url: https://api.kurobbs.com
  did: 10D24CBAB8530014D33229F7DAEB771478DC9771 #严格说应该每人不同 │ 但服务端不严格校验, 共用没问题
